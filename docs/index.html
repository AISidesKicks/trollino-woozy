<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🥴 Trollino Woozy & Co</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      font-family: system-ui, sans-serif;
    }
    .postcard {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      padding: 40px;
      text-align: center;
      max-width: 650px;
    }
    .logo { width: 150px; border-radius: 8px; }
    h1 { font-size: 1.5rem; margin: 20px 0 10px; }
    .subtitle { color: #666; margin-bottom: 20px; }
    .description { color: #333; line-height: 1.6; margin-bottom: 20px; }
    .tagline { font-style: italic; color: #888; margin-bottom: 20px; }
    .tagline a { color: #666; }
    .links a {
      display: inline-block;
      margin: 0 10px;
      padding: 10px 20px;
      background: #333;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }
    .links a:hover { background: #555; }
  </style>
</head>
<body>
  <div class="postcard">
    <img src="woozy-logo.jpg" alt="Woozy Logo" class="logo">
    <h1>🥴 Trollino Woozy & Co</h1>
    <p class="subtitle">The Lobotomy Tone HAT</p>
    <p class="tagline">Part of <a href="https://antonio.trollino.rodeo">Trollino AU EDU LAB</a></p>
    <p class="description">
      A "Woozy Tone" LoRA - a deliberate "soft lobotomy" that forces an LLM 
      into a state of dizziness and wavy-mouthed confusion.
    </p>
    <p class="tagline">Black Tone HAT to tricky companion to 21 colorful Tone HATs</p>
    <div class="links">
      <a href="https://github.com/AISidesKicks/trollino-woozy">GitHub</a>
    </div>
  </div>
</body>
</html>
